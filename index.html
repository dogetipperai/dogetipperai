<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogeTipper AI - Instant Doge Memes & Tips</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
    
    body {
      font-family: 'VT323', monospace;
      background: #0a0a1f;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
      background-image: linear-gradient(rgba(255,204,0,0.1), rgba(0,255,204,0.1));
    }
    .header {
      margin-bottom: 40px;
    }
    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 3.8rem;
      color: #ffcc00;
      text-shadow: 0 0 30px #ffcc00;
      margin: 0;
    }
    .subtitle {
      font-size: 1.8rem;
      color: #00ffcc;
      margin: 10px 0 30px 0;
    }
    .input-area {
      max-width: 700px;
      margin: 0 auto 30px;
    }
    textarea {
      width: 100%;
      height: 180px;
      padding: 25px;
      font-size: 1.4rem;
      background: #1c1c3c;
      border: 6px solid #ffcc00;
      border-radius: 16px;
      color: #fff;
      font-family: 'VT323', monospace;
    }
    .buttons {
      margin: 25px 0;
    }
    button {
      padding: 18px 50px;
      font-size: 1.5rem;
      font-family: 'Press Start 2P', cursive;
      margin: 10px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .generate-btn {
      background: #ffcc00;
      color: black;
      box-shadow: 0 0 30px #ffcc00;
    }
    .tip-btn {
      background: #00ffcc;
      color: black;
      box-shadow: 0 0 30px #00ffcc;
    }
    .output {
      max-width: 700px;
      margin: 40px auto;
      padding: 40px 30px;
      background: #1c1c3c;
      border: 8px solid #ffcc00;
      border-radius: 20px;
      min-height: 340px;
      box-shadow: 0 0 50px rgba(255, 204, 0, 0.5);
    }
    .doge {
      font-size: 7rem;
      margin: 10px 0;
      animation: bounce 1.5s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    footer {
      margin-top: 70px;
      color: #666;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>DogeTipper AI</h1>
    <p class="subtitle">🐕 Much Meme • Very Tip • So AI</p>
  </div>

  <div class="input-area">
    <textarea id="inputText" placeholder="Paste any text or tweet here..."></textarea>
  </div>

  <div class="buttons">
    <button class="generate-btn" onclick="generateMeme()">🚀 GENERATE MEME</button>
    <button class="tip-btn" onclick="sendTip()">💰 SEND TIP</button>
  </div>

  <div id="output" class="output">
    <p>Your awesome Doge meme will appear here...</p>
  </div>

  <footer>
    Built for the Doge Community • Your tips support development 🐕
  </footer>

  <script>
    function generateMeme() {
      const text = document.getElementById('inputText').value.trim();
      const output = document.getElementById('output');
      
      if (!text) {
        output.innerHTML = `<p style="color:#ff6666; font-size:1.6rem;">🐕 WOW! Please enter some text first...</p>`;
        return;
      }

      output.innerHTML = `
        <p class="doge">🐕</p>
        <p style="font-size:2rem; color:#ffdd55; line-height:1.4;">${text}</p>
        <p style="color:#00ffcc; font-size:1.6rem; margin:30px 0;">"Such wisdom. Very tip. Much AI!"</p>
      `;
    }

    function sendTip() {
      const dogeAddress = "D5z8yM7E4hqKKSeota4K6PwictgtW7nprJ";
      const message = `💰 Send your Doge to:\n\n${dogeAddress}\n\nThank you for supporting DogeTipper AI! 🐕`;
      
      alert(message);
      navigator.clipboard.writeText(dogeAddress);
    }
  </script>
</body>
</html>
