<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogeTipper AI 🐕💰</title>
  <style>
    body {
      font-family: 'VT323', monospace;
      background: #0a0a1f;
      color: #fff;
      margin: 0;
      padding: 30px 20px;
    }
    h1 { font-family: 'Press Start 2P', cursive; font-size: 3.2rem; color: #ffcc00; text-shadow: 0 0 25px #ffcc00; }
    .subtitle { color: #00ffcc; font-size: 1.6rem; margin-bottom: 30px; }
    select, textarea, button {
      font-family: 'VT323', monospace;
      font-size: 1.3rem;
    }
    .mode-select { margin: 20px 0; }
    textarea { width: 100%; max-width: 800px; height: 150px; padding: 20px; background: #1c1c3c; border: 5px solid #ffcc00; border-radius: 12px; color: white; }
    button {
      padding: 15px 40px;
      margin: 10px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1.4rem;
    }
    .generate { background: #ffcc00; color: black; }
    .tip { background: #00ffcc; color: black; }
    .output {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      background: #1c1c3c;
      border: 6px solid #ffcc00;
      border-radius: 16px;
      min-height: 300px;
      text-align: left;
    }
    .doge { font-size: 5rem; }
  </style>
</head>
<body>
  <h1>DogeTipper AI</h1>
  <p class="subtitle">🐕 Create • Meme • Work • School • Projects • Games</p>

  <div class="mode-select">
    <select id="mode">
      <option value="meme">Doge Meme Generator</option>
      <option value="work">Work / School Helper</option>
      <option value="project">Project Idea Generator</option>
      <option value="game">Game Idea Creator</option>
      <option value="motivate">Doge Motivation</option>
    </select>
  </div>

  <textarea id="inputText" placeholder="Enter your idea or topic..."></textarea><br><br>

  <button class="generate" onclick="generate()">🚀 GENERATE WITH DOGE POWER</button>
  <button class="tip" onclick="sendTip()">💰 TIP THE PACK</button>

  <div id="output" class="output">
    <p>Select a mode and describe what you want...</p>
  </div>

  <script>
    const dogeAddress = "D5z8yM7E4hqKKSeota4K6PwictgtW7nprJ";

    function generate() {
      const mode = document.getElementById('mode').value;
      const input = document.getElementById('inputText').value.trim();
      const output = document.getElementById('output');

      if (!input) {
        output.innerHTML = `<p style="color:#ff6666">🐕 Wow! Tell me what you want to create...</p>`;
        return;
      }

      let result = `<p class="doge">🐕</p>`;

      if (mode === "meme") {
        result += `<p><strong>Doge Meme:</strong> "${input}"</p><p>Such ${input.toLowerCase()}. Very wow. To the moon! 🌕</p>`;
      } else if (mode === "work") {
        result += `<p><strong>Work/School Idea:</strong> ${input}</p><p>Doge suggests: Make it simple, make it fast, add memes to your presentation!</p>`;
      } else if (mode === "project") {
        result += `<p><strong>Project Idea:</strong> ${input} + Doge theme</p><p>Build a Doge-themed version. Much community. Very viral.</p>`;
      } else if (mode === "game") {
        result += `<p><strong>Game Concept:</strong> ${input}</p><p>Doge character collects coins while avoiding bears. To the moon level!</p>`;
      } else if (mode === "motivate") {
        result += `<p><strong>Doge Motivation:</strong></p><p>${input}? You got this! Such determination. Very success. Hold strong! 🐕</p>`;
      }

      output.innerHTML = result;
    }

    function sendTip() {
      alert(`💰 Support DogeTipper AI:\n\n${dogeAddress}\n\nThank you! Much love from the pack 🐕`);
      navigator.clipboard.writeText(dogeAddress);
    }
  </script>
</body>
</html>
