<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doge City 2026 🏙️🐕</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    #info { position:absolute; top:10px; left:10px; color:white; font-family:Arial; background:rgba(0,0,0,0.5); padding:10px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
  <div id="info">
    DOGE CITY 🏙️<br>
    WASD or Arrow Keys to move • Mouse to look around
  </div>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x112233);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lights
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 100, 50);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshLambertMaterial({color: 0x223322})
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Buildings
    function createBuilding(x, z, height, color) {
      const building = new THREE.Mesh(
        new THREE.BoxGeometry(20, height, 20),
        new THREE.MeshLambertMaterial({color: color})
      );
      building.position.set(x, height/2, z);
      scene.add(building);
    }

    // Create city
    for (let i = -5; i < 6; i++) {
      for (let j = -5; j < 6; j++) {
        if (Math.random() > 0.3) {
          createBuilding(i*35, j*35, 30 + Math.random()*80, Math.random() > 0.5 ? 0x4444aa : 0xaa4444);
        }
      }
    }

    camera.position.set(0, 40, 80);
    camera.lookAt(0, 0, 0);

    let move = {};
    document.addEventListener('keydown', e => move[e.key.toLowerCase()] = true);
    document.addEventListener('keyup', e => move[e.key.toLowerCase()] = false);

    function animate() {
      requestAnimationFrame(animate);

      if (move['w'] || move['arrowup']) camera.position.z -= 1;
      if (move['s'] || move['arrowdown']) camera.position.z += 1;
      if (move['a'] || move['arrowleft']) camera.position.x -= 1;
      if (move['d'] || move['arrowright']) camera.position.x += 1;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
