<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doge Pac-Man 🐕🍖</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:'Press Start 2P', cursive; text-align:center; }
    canvas { image-rendering: pixelated; border: 8px solid #ffcc00; margin:20px auto; display:block; background:#000; }
    h1 { color:#ffcc00; text-shadow:0 0 20px #ffcc00; }
    button { padding:15px 40px; margin:10px; font-size:1.3rem; background:#ffcc00; color:black; border:none; cursor:pointer; }
  </style>
</head>
<body>
  <h1>DOGE PAC-MAN 🐕</h1>
  <div>Score: <span id="score">0</span> | High: <span id="high">0</span></div>
  <canvas id="game" width="560" height="620"></canvas><br>
  <button onclick="startGame()">NEW GAME</button>
  <button onclick="sendTip()">💰 TIP THE DOGE</button>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let score = 0;
    let highScore = localStorage.getItem('dogePacHigh') || 0;
    document.getElementById('high').textContent = highScore;

    const dogeAddress = "D5z8yM7E4hqKKSeota4K6PwictgtW7nprJ";

    let x = 280, y = 460, dir = 'right';
    let scoreVal = 0;

    function startGame() {
      scoreVal = 0;
      document.getElementById('score').textContent = 0;
      alert("Use Arrow Keys to move Doge!\nEat the coins! 🐕");
      gameLoop();
    }

    function sendTip() {
      alert(`Thanks for playing Doge Pac-Man!\n\n${dogeAddress}`);
      navigator.clipboard.writeText(dogeAddress);
    }

    function gameLoop() {
      ctx.fillStyle = '#000033';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Maze walls (simple)
      ctx.fillStyle = '#00f';
      ctx.fillRect(40, 40, 480, 20);
      ctx.fillRect(40, 560, 480, 20);

      // Doge
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI*2);
      ctx.fill();

      // Coins
      ctx.fillStyle = '#ff0';
      for (let i = 0; i < 8; i++) {
        ctx.fillRect(80 + i*60, 200, 12, 12);
      }

      // Movement
      if (dir === 'right') x += 4;
      if (dir === 'left') x -= 4;
      if (dir === 'up') y -= 4;
      if (dir === 'down') y += 4;

      // Score
      scoreVal += 1;
      document.getElementById('score').textContent = scoreVal;

      if (scoreVal > highScore) {
        highScore = scoreVal;
        localStorage.setItem('dogePacHigh', highScore);
        document.getElementById('high').textContent = highScore;
      }

      requestAnimationFrame(gameLoop);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') dir = 'right';
      if (e.key === 'ArrowLeft') dir = 'left';
      if (e.key === 'ArrowUp') dir = 'up';
      if (e.key === 'ArrowDown') dir = 'down';
    });
  </script>
</body>
</html>
