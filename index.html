<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DogeTipper AI 🐕💰</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
    
    body {
      font-family: 'VT323', monospace;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 30px 20px;
      min-height: 100vh;
    }
    .container { max-width: 820px; margin: 0 auto; }
    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 3.5rem;
      color: #ffcc00;
      text-shadow: 0 0 25px #ffcc00;
      margin: 0 0 8px 0;
    }
    .tagline {
      font-size: 1.6rem;
      color: #00ffcc;
      margin-bottom: 40px;
      text-shadow: 0 0 10px #00ffcc;
    }
    textarea {
      width: 100%;
      height: 160px;
      padding: 25px;
      font-size: 1.3rem;
      background: #1a1433;
      border: 5px solid #ffcc00;
      border-radius: 20px;
      color: #fff;
      font-family: 'VT323', monospace;
    }
    button {
      padding: 18px 45px;
      font-size: 1.4rem;
      font-family: 'Press Start 2P', cursive;
      margin: 12px;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }
    .generate-btn {
      background: #ffcc00;
      color: #000;
      box-shadow: 0 0 25px #ffcc00;
    }
    .tip-btn {
      background: #00ffcc;
      color: #000;
      box-shadow: 0 0 25px #00ffcc;
    }
    .meme-output {
      margin: 40px auto;
      padding: 35px;
      background: rgba(26, 20, 51, 0.95);
      border: 6px solid #ffcc00;
      border-radius: 25px;
      min-height: 320px;
      box-shadow: 0 0 40px rgba(255, 204, 0, 0.6);
    }
    .doge { font-size: 6rem; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    footer { margin-top: 60px; color: #777; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>DogeTipper AI 🐕💰</h1>
    <p class="tagline">Instant Memes • Instant Tips • Much Wow</p>
    
    <textarea id="inputText" placeholder="Type or paste text here..."></textarea>
    
    <button class="generate-btn" onclick="generateMeme()">🚀 GENERATE DOGE MEME</button>
    <button class="tip-btn" onclick="sendTip()">💰 SEND TIP</button>

    <div id="output" class="meme-output">
      <p>Your Doge meme appears here...</p>
    </div>

    <footer>
      Built for the Doge Community • Version 1.0
    </footer>
  </div>

  <script>
    function generateMeme() {
      const text = document.getElementById('inputText').value.trim();
      const output = document.getElementById('output');
      
      if (!text) {
        output.innerHTML = `<p style="color:#ff7777; font-size:1.4rem;">🐕 WOW! Enter some text first...</p>`;
        return;
      }

      output.innerHTML = `
        <p class="doge">🐕</p>
        <p style="font-size:1.8rem; color:#ffcc00; line-height:1.4;">${text}</p>
        <p style="color:#00ffcc; font-size:1.5rem; margin:25px 0;">"Such wisdom. Very tip. Much AI!"</p>
      `;
    }

    function sendTip() {
      const dogeAddress = "D5z8yM7E4hqKKSeota4K6PwictgtW7nprJ";
      const message = `💰 Send Doge to:\n\n${dogeAddress}\n\nThank you for supporting DogeTipper AI! 🐕\n\nAddress copied to clipboard!`;
      
      alert(message);
      navigator.clipboard.writeText(dogeAddress);
    }
  </script>
</body>
</html>
